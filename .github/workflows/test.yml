name: Run API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run API tests
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        TANDOOR_TOKEN: ${{ secrets.TANDOOR_TOKEN }}
      run: |
        pytest tests/test_api_simple.py -v
        pytest tests/test_meal_plan_api.py -v
        pytest tests/test_api_shopping_list.py -v
        pytest tests/test_api_delete_meal_plan.py -v